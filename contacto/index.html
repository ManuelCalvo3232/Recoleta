<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contacto | Recoleta Consultora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Copse&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100vh;
        margin: 0;
        background: #fcf8f2;
        font-family: system-ui, sans-serif;
      }

      .contact-section {
        min-height: 100vh;
        display: flex;
        position: relative;
      }

      .contact-content {
        width: 65%;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px;
        background: #fcf8f2;
      }

      .contact-card {
        width: 100%;
        max-width: 620px;
      }

      .contact-card h1 {
        font-family: "Copse", serif;
        color: #214f2a;
        margin-bottom: 0.75rem;
      }

      .contact-card p {
        color: #6c757d;
        margin-bottom: 2rem;
      }

      .form-control {
        border-radius: 4px;
        padding: 0.9rem 1rem;
        border: 1px solid #d7d7d7;
        box-shadow: none !important;
      }

      .form-control:focus {
        border-color: #214f2a;
      }

      textarea {
        resize: none;
      }

      .btn-enviar {
        background: #214f2a;
        color: white;
        border: none;
        padding: 0.9rem;
        transition: 0.3s;
      }

      .btn-enviar:hover {
        background: #17381d;
        color: white;
      }

      .btn-volver {
        position: absolute;
        top: 24px;
        right: 24px;
        background: transparent;
        color: #214f2a;
        border: 1px solid #214f2a;
        padding: 0.5rem 1.2rem;
        border-radius: 4px;
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.3s;
        z-index: 10;
      }

      .btn-volver:hover {
        background: #214f2a;
        color: white;
      }

      /* Columna de la imagen: ahora solo sirve para centrar el cuadro */
      .contact-image {
        width: 35%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 40px 40px 0;
        box-sizing: border-box;
      }

      .contact-image-wrapper {
        width: 100%;
        max-width: 420px;
      }

      .contact-image img {
        width: 100%;
        max-width: 420px;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      }

      .status-msg {
        padding: 0.75rem 1rem;
        border-radius: 4px;
        font-size: 0.95rem;
      }

      .status-success {
        background: #e6f2e8;
        color: #214f2a;
        border: 1px solid #b8dcc0;
      }

      .status-error {
        background: #fdecea;
        color: #a1332a;
        border: 1px solid #f3c2bd;
      }

      @media (max-width: 992px) {
        .contact-section {
          flex-direction: column-reverse;
        }

        .contact-content,
        .contact-image {
          width: 100%;
        }

        .contact-image {
          padding: 30px;
        }

        .contact-image img {
          max-width: 320px;
        }

        .contact-content {
          padding: 50px 30px;
        }

        .btn-volver {
          top: 16px;
          right: 16px;
        }
      }
    </style>
  </head>

  <body>
    <section class="contact-section">
<a href="../index.html" class="btn-volver">← Volver</a>
      <!-- Formulario -->

      <div class="contact-content">
        <div class="contact-card">
          <h1>Contactanos</h1>

          <p>
            Contanos sobre tu proyecto. Te responderemos a la brevedad para
            coordinar una reunión y analizar cómo podemos ayudarte.
          </p>

          <!-- Listo para conectar a una API -->
          <form id="contactForm">
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                id="nombre"
                name="nombre"
                placeholder="Nombre completo"
                required
              />
            </div>

            <div class="mb-3">
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Correo electrónico"
                required
              />
            </div>

            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                id="empresa"
                name="empresa"
                placeholder="Empresa (opcional)"
              />
            </div>

            <div class="mb-4">
              <textarea
                class="form-control"
                id="mensaje"
                name="mensaje"
                rows="6"
                placeholder="¿En qué podemos ayudarte?"
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-enviar w-100">
              Enviar consulta
            </button>

            <div id="formStatus" class="mt-3" style="display: none;"></div>
          </form>
        </div>
      </div>

      <!-- Imagen -->

      <div class="contact-image">
        <div class="contact-image-wrapper">
          <img src="lugar-contacto.png" alt="Contacto" />
          <a
            href="https://maps.app.goo.gl/R47qw876kWvc9TLU7"
            target="_blank"
            rel="noopener noreferrer"
            class="btn btn-enviar w-100 mt-3 d-block text-center text-decoration-none"
          >
            ¿Cómo llegar?
          </a>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const SUPABASE_URL = "https://fuxecacadodctewultqk.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1eGVjYWNhZG9kY3Rld3VsdHFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTQzNjcsImV4cCI6MjA5OTYzMDM2N30.5ZtJQSoaHB1s4Pdi1sYs-rHf4n1U8L7cfuyC_7ISn-E";

      const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const form = document.getElementById("contactForm");
      const boton = form.querySelector("button[type='submit']");
      const status = document.getElementById("formStatus");

      function mostrarMensaje(texto, tipo) {
        status.textContent = texto;
        status.className = `mt-3 status-msg status-${tipo}`;
        status.style.display = "block";

        clearTimeout(window._statusTimeout);
        window._statusTimeout = setTimeout(() => {
          status.style.display = "none";
        }, 3000);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
          nombre: document.getElementById("nombre").value,
          email: document.getElementById("email").value,
          empresa: document.getElementById("empresa").value || null,
          mensaje: document.getElementById("mensaje").value,
        };

        boton.disabled = true;
        boton.textContent = "Enviando...";
        status.style.display = "none";

        const { error } = await client.from("contactos").insert(data);

        if (error) {
          console.error(error);
          mostrarMensaje(
            "Hubo un error al enviar tu consulta. Intentá de nuevo.",
            "error"
          );
        } else {
          mostrarMensaje("¡Gracias! Te vamos a contactar pronto.", "success");
          form.reset();
        }

        boton.disabled = false;
        boton.textContent = "Enviar consulta";
      });
    </script>
  </body>
</html>
